name: wedding-webhook

on:
  push:
    paths:
      - "deploy/webhook/**"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase owner
        id: lowercase-owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./deploy/webhook
          push: true
          tags: |
            ghcr.io/${{ steps.lowercase-owner.outputs.owner }}/wedding-webhook:c-${{ github.sha }}
            ghcr.io/${{ steps.lowercase-owner.outputs.owner }}/wedding-webhook:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase owner
        id: lowercase-owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.lowercase-owner.outputs.owner }}/wedding-api:c-${{ github.sha }}
            ghcr.io/${{ steps.lowercase-owner.outputs.owner }}/wedding-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify webhook
        run: |
          echo "Sending webhook notification..."
          echo "Webhook URL: ${{ vars.WEBHOOK_URL }}"
          echo "Tag: c-${{ github.sha }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Actor: ${{ github.actor }}"
          echo "Repository: ${{ github.repository }}"
          
          RESPONSE=$(curl -f -X POST "${{ vars.WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.WEBHOOK_SECRET }}" \
            -d '{"tag": "c-${{ github.sha }}"}' \
            2>&1)
          
          CURL_EXIT_CODE=$?
          echo "Webhook response: $RESPONSE"
          echo "Curl exit code: $CURL_EXIT_CODE"
          
          if [ $CURL_EXIT_CODE -ne 0 ]; then
            echo "Webhook notification failed!"
            exit 1
          fi
          
          echo "Webhook notification successful"

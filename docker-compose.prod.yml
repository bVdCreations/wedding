services:
  caddy:
    image: caddy:2-alpine
    container_name: wedding_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

  api:
    image: ${API_IMAGE:-ghcr.io/bvdcreations/wedding-api:latest}
    container_name: wedding_api
    restart: unless-stopped
    pull_policy: always
    env_file:
      - .env.prod
    environment:
      FRONTEND_URL: https://gemma-bastiaan.wedding
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: wedding_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "54320:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  webhook:
    image: ${WEBHOOK_IMAGE:-ghcr.io/bvdcreations/wedding-webhook:latest}
    container_name: wedding_webhook
    restart: unless-stopped
    pull_policy: always
    env_file:
      - .env.prod
    environment:
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      COMPOSE_FILE: docker-compose.prod.yml
      ENV_FILE: .env.prod
      API_IMAGE_BASE: ${API_IMAGE_BASE}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .env.prod:/app/.env.prod
      - ./docker-compose.prod.yml:/app/docker-compose.prod.yml

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
